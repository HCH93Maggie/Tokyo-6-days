<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京自駕 · 高級考察團</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { serif: ['Noto Serif TC', 'serif'], sans: ['system-ui', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background-color: #F6F6F6; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        .serif-title { font-family: 'Noto Serif TC', serif; font-weight: 900; }
        .pwa-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .nav-bar { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* 彈出視窗樣式 */
        #detail-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; }
        #detail-modal.active { display: flex; }
    </style>
</head>
<body class="pb-32 font-sans">

    <div id="page-itinerary" class="page active">
        <div class="px-8 pt-10 pb-6 bg-white rounded-b-[32px] mb-6 shadow-sm">
            <p class="text-xs text-gray-400 tracking-widest text-center font-bold uppercase">Family Trip 2026</p>
            <h1 class="serif-title text-4xl text-center mt-2">東京旅行</h1>
            <div class="flex justify-between items-end mt-8">
                <div><p class="text-[10px] text-gray-400">MON</p><p class="serif-title text-5xl">16<span class="text-red-500">.</span></p></div>
                <div class="text-right"><span class="text-3xl">☀️</span><p class="text-xs font-bold mt-1">18°C / 12°C</p></div>
            </div>
        </div>

        <div class="px-5 space-y-6">
            <div class="pwa-card relative aspect-[16/9] cursor-pointer" onclick="openModal('敘敘苑燒肉', '19:00', '東京都新宿區...', '03-5360-8689')">
                <img src="https://images.unsplash.com/photo-1590759668628-05b0fc34b139?q=80&w=800" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent p-5 flex flex-col justify-end">
                    <p class="text-white/70 text-[10px] font-bold tracking-widest uppercase">Day 1 · 19:00</p>
                    <h2 class="serif-title text-2xl text-white mt-1">敘敘苑燒肉 (新宿店)</h2>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-2 mt-4">
                <button class="py-3 bg-white rounded-xl text-xs font-bold shadow-sm">D2</button>
                <button class="py-3 bg-white rounded-xl text-xs font-bold shadow-sm">D3</button>
                <button class="py-3 bg-white rounded-xl text-xs font-bold shadow-sm">D4</button>
            </div>
        </div>
    </div>

    <div id="page-finance" class="page px-6 pt-10">
        <h1 class="serif-title text-3xl mb-6">預算支出</h1>
        <div class="pwa-card p-6 mb-4">
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-2">Total Spent</p>
            <p class="serif-title text-4xl text-red-600">¥ 12,500</p>
        </div>
        <div class="pwa-card p-6">
            <input type="number" id="money-input" placeholder="輸入日幣金額" class="w-full p-4 bg-gray-50 rounded-xl mb-4 text-lg">
            <button onclick="addExpense()" class="w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold uppercase tracking-widest">記錄支出</button>
        </div>
    </div>

    <div id="detail-modal" onclick="closeModal()">
        <div class="bg-white w-full rounded-t-[32px] p-8 pb-12 animate-slide-up" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span class="text-[10px] font-bold px-3 py-1 bg-red-50 text-red-600 rounded-full">FOOD</span>
                    <h2 id="modal-title" class="serif-title text-3xl mt-4"></h2>
                </div>
                <button onclick="closeModal()" class="text-gray-300 text-2xl">&times;</button>
            </div>
            
            <div class="space-y-4 mb-8">
                <p class="text-[11px] font-bold text-gray-400 tracking-wider uppercase">指差し会話</p>
                <div class="p-4 bg-gray-50 rounded-xl flex justify-between text-sm">
                    <span>上等牛舌</span><span class="font-serif">上タン塩</span>
                </div>
            </div>

            <a id="modal-nav" href="#" class="w-full flex items-center justify-center gap-3 py-4 bg-white border border-gray-200 rounded-2xl font-bold shadow-sm">
                <i class="fa-regular fa-paper-plane text-gray-400"></i>
                <span id="modal-phone" class="text-gray-800">導航至地點</span>
            </a>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 pb-8 nav-bar border-t border-gray-100 flex justify-around items-center z-50">
        <button onclick="switchPage('itinerary')" id="btn-itinerary" class="nav-item text-red-600"><i class="fa-solid fa-map text-xl"></i><p class="text-[10px] mt-1 font-bold">行程</p></button>
        <button onclick="switchPage('finance')" id="btn-finance" class="nav-item text-gray-300"><i class="fa-solid fa-receipt text-xl"></i><p class="text-[10px] mt-1 font-bold">記帳</p></button>
        <button onclick="alert('工具箱開發中')" class="nav-item text-gray-300"><i class="fa-solid fa-toolbox text-xl"></i><p class="text-[10px] mt-1 font-bold">工具</p></button>
    </nav>

    <script>
        // 切換頁面功能
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.replace('text-red-600', 'text-gray-300'));
            document.getElementById('btn-' + pageId).classList.replace('text-gray-300', 'text-red-600');
        }

        // 彈出視窗功能
        function openModal(title, time, addr, phone) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-phone').innerText = phone;
            document.getElementById('modal-nav').href = "tel:" + phone;
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        function addExpense() {
            const val = document.getElementById('money-input').value;
            if(val) alert('成功記錄 ¥' + val + '！(稍後我們串接 Firebase 就能存起來了)');
        }
    </script>
</body>
</html>。
