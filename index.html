<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京 · 紙誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { serif: ['Noto Serif TC', 'serif'], sans: ['system-ui', 'sans-serif'] } } }
        }
    </script>
    <style>
        /* 紙張質感背景 */
        body { 
            background-color: #F4F1EA;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            color: #2C2C2C;
            -webkit-tap-highlight-color: transparent;
        }
        .serif-title { font-family: 'Noto Serif TC', serif; }
        .paper-card { 
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 2px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
        }
        /* 隱藏式極簡導航 */
        .nav-text { font-size: 11px; letter-spacing: 0.2em; color: #A0A0A0; transition: 0.3s; font-weight: bold; }
        .nav-text.active { color: #2C2C2C; border-bottom: 1px solid #2C2C2C; }
        
        /* 動畫 */
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        #add-modal { display: none; position: fixed; inset: 0; background: rgba(244, 241, 234, 0.95); z-index: 100; align-items: center; justify-content: center; }
        #add-modal.active { display: flex; }
    </style>
</head>
<body class="pb-20 font-sans">

    <nav class="flex justify-center gap-8 py-8 sticky top-0 z-50 bg-[#F4F1EA]/80 backdrop-blur-md">
        <button onclick="switchPage('itinerary')" class="nav-text active" id="btn-itinerary">ITINERARY</button>
        <button onclick="switchPage('finance')" class="nav-text" id="btn-finance">BUDGET</button>
        <button onclick="showAddModal()" class="nav-text text-orange-700">+ ADD</button>
    </nav>

    <main id="page-itinerary" class="page fade-in px-8 active">
        <header class="mb-12 text-center">
            <p class="text-[10px] tracking-[0.3em] text-gray-400 mb-2 uppercase">Volume. 01</p>
            <h1 class="serif-title text-4xl font-black italic">東京 · 考察日記</h1>
            <div class="h-[1px] w-12 bg-gray-300 mx-auto mt-6"></div>
        </header>

        <div id="itinerary-list" class="space-y-12">
            <article class="relative">
                <p class="text-[10px] font-mono text-gray-400 mb-2 tracking-widest">19:00 / DINING</p>
                <h2 class="serif-title text-2xl mb-4">敘敘苑燒肉 新
