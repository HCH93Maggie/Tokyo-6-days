<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOKYO DIARY AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        /* 強制紙質感底色 */
        body { 
            background: #F4F1EA !important; 
            color: #2C2C2C; 
            font-family: sans-serif;
            margin: 0; padding: 0;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        .card { background: white; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; }
        /* 彈窗：預設隱藏 */
        #myModal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: #F4F1EA; z-index: 9999; 
            overflow-y: auto; padding: 40px 20px;
        }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; padding: 30px 20px;">
        <div class="serif" style="font-size: 20px; font-weight: 900;">TOKYO JOURNAL</div>
        <button onclick="openAdd()" style="background: #000; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: bold;">+ ADD SPOT</button>
    </div>

    <div id="list" style="padding: 0 20px;">
        <div class="card" style="margin-bottom: 30px;" onclick="viewDetail('敘敘苑燒肉', '新宿高空絕美燒肉，必點牛舌。', '上等牛舌 / 上タン, 壺漬小排 / 壺漬け')">
            <img src="https://images.unsplash.com/photo-1590759668628-05b0fc34b139?w=800" style="width: 100%; aspect-ratio: 4/5; object-fit: cover;">
            <div style="padding: 20px;">
                <div style="font-size: 10px; color: #999; letter-spacing: 2px;">DINING</div>
                <div class="serif" style="font-size: 24px; margin-top: 5px;">敘敘苑燒肉</div>
            </div>
        </div>
    </div>

    <div id="myModal">
        <button onclick="closeModal()" style="font-size: 30px; border: none; background: none; margin-bottom: 20px;">×</button>
        <h1 id="m-title" class="serif" style="font-size: 40px; margin-bottom: 20px;"></h1>
        <p id="m-desc" style="font-style: italic; color: #666; line-height: 1.8; margin-bottom: 30px;"></p>
        <div style="font-size: 12px; color: #999; margin-bottom: 15px; font-weight: bold;">AI RECOMMENDED MENU</div>
        <div id="m-menu" style="border-top: 1px solid #ddd;"></div>
    </div>

    <div id="addModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; padding: 60px 40px;">
        <h2 class="serif" style="font-size: 30px;">要去哪裡？</h2>
        <input type="text" id="inp-name" placeholder="輸入地名..." style="width:100%; border:none; border-bottom:2px solid #000; padding: 20px 0; font-size: 20px; outline:none; margin-top: 40px;">
        <div style="margin-top: 50px; display: flex; gap: 10px;">
            <button onclick="doAiGen()" style="flex:2; background:#000; color:#fff; padding: 20px; font-weight:bold;">AI GENERATE</button>
            <button onclick="closeAdd()" style="flex:1; border:1px solid #000; padding: 20px;">BACK</button>
        </div>
    </div>

    <script>
        // 1. 開啟詳情
        function viewDetail(title, desc, menuStr) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-desc').innerText = desc;
            
            const menuArr = menuStr.split(',');
            let html = '';
            menuArr.forEach(m => {
                html += `<div style="padding: 15px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px;">${m}</div>`;
            });
            document.getElementById('m-menu').innerHTML = html;
            document.getElementById('myModal').style.display = 'block';
        }

        // 2. 關閉詳情
        function closeModal() {
            document.getElementById('myModal').style.display = 'none';
        }
