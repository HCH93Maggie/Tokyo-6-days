<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京 · 紙誌 · 旅行助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: #F4F1EA !important; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            color: #2C2C2C; 
            -webkit-tap-highlight-color: transparent;
            margin: 0; overflow-x: hidden;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 底部導航 - 重新設計避免遮擋 */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(244, 241, 234, 0.95);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around;
            padding: 15px 0 30px 0; border-top: 1px solid rgba(0,0,0,0.05);
            z-index: 999;
        }
        .tab-item { text-align: center; color: #A0A0A0; font-size: 10px; font-weight: bold; border: none; background: none; cursor: pointer; }
        .tab-item.active { color: #2C2C2C; }

        /* 卡片設計 */
        .card { background: white; border-radius: 2px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 25px; overflow: hidden; cursor: pointer; }
        
        /* 彈窗 */
        .full-modal { 
            display: none; position: fixed; inset: 0; 
            background: #F4F1EA; z-index: 2000; 
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            overflow-y: auto; padding: 40px 25px;
        }
        .full-modal.active { display: block; }
    </style>
</head>
<body>

    <div id="p-home" class="page active px-8 pt-16">
        <p class="text-[10px] tracking-[0.4em] text-gray-400 mb-2 uppercase">Monday, March 16</p>
        <h1 class="serif text-5xl font-black italic mb-8">東京考察</h1>
        <div class="flex justify-between items-end border-b border-black/10 pb-8 mb-8">
            <div class="text-6xl serif">18<span class="text-orange-500">°</span></div>
            <div class="text-right text-xs font-bold tracking-widest">SUNNY / TOKYO<br>H: 21° L: 12°</div>
        </div>
        <div class="card p-8 bg-zinc-900 text-white">
            <p class="text-[10px] tracking-[0.3em] opacity-60 mb-4 uppercase">Today's Highlight</p>
            <h2 class="serif text-2xl mb-2">新宿高空考察</h2>
            <p class="text-xs opacity-70 leading-relaxed italic">「在光影交織的城市森林中，找尋下一波商業靈感。」</p>
        </div>
    </div>

    <div id="p-itinerary" class="page px-6 pt-10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="serif text-3xl italic text-center">每日行程</h2>
            <button onclick="toggleModal('m-add', true)" class="bg-black text-white px-4 py-2 text-[10px] font-bold rounded-full">+ ADD</button>
        </div>
        <div id="itinerary-list">
            <div class="card" onclick="viewDetail('敘敘苑燒肉', '新宿高空景觀燒肉。', '上等牛舌 / 上タン塩, 壺漬小排 / 壺漬け')">
                <img src="https://images.unsplash.com/photo-1590759668628-05b0fc34b139?w=800" class="w-full aspect-video object-cover grayscale-[20%]">
                <div class="p-5">
                    <span class="text-[9px] font-bold text-orange-600 tracking-widest uppercase">19:00 Dining</span>
                    <h3 class="serif text-xl mt-1">敘敘苑燒肉</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="p-budget" class="page px-8 pt-16">
        <h2 class="serif text-4xl mb-12 italic">支出明細</h2>
        <div class="border-y border-black/10 py-10 mb-10 text-center">
            <p class="text-[10px] tracking-widest text-gray-400 mb-2 uppercase">Estimated Total</p>
            <p class="serif text-5xl tracking-tighter">¥ 12,500</p>
        </div>
        <div class="space-y-6">
            <div class="flex justify-between text-sm border-b border-black/5 pb-4">
                <span class="font-bold">敘敘苑 (預約金)</span>
                <span class="serif">¥ 10,000</span>
            </div>
            <div class="flex justify-between text-sm border-b border-black/5 pb-4">
                <span class="font-bold">Suica 儲值</span>
                <span class="serif">¥ 2,500</span>
            </div>
        </div>
    </div>

    <div id="m-detail" class="full-modal">
        <button onclick="toggleModal('m-detail', false)" class="mb-10 text-2xl">&times;</button>
        <h2 id="md-title" class="serif text-4xl mb-6"></h2>
        <p id="md-desc" class="text-sm italic text-gray-500 leading-relaxed mb-10"></p>
        <div class="text-[10px] font-bold text-gray-400 tracking-[0.3em] mb-6 uppercase">AI Generated Menu</div>
        <div id="md-menu" class="space-y-4 border-t border-black/5 pt-6"></div>
    </div>

    <div id="m-add" class="full-modal">
        <button onclick="toggleModal('m-add', false)" class="mb-10 text-2xl">&times;</button>
        <h2 class="serif text-3xl mb-10">新增目的地</h2>
        <input type="text" id="in-name" placeholder="輸入地點名稱..." class="w-full bg-transparent border-b-2 border-black py-4 text-2xl outline-none serif">
        <button onclick="aiGen()" class="w-full mt-12 bg-black text-white py-5 font-bold text-xs tracking-widest">AI GENERATE GUIDE</button>
    </div>

    <nav class="tab-bar">
        <button onclick="switchTab('home')" class="tab-item active" id="t-home">
            <i class="fa-solid fa-house mb-1"></i><br>HOME
        </button>
        <button onclick="switchTab('itinerary')" class="tab-item" id="t-itinerary">
            <i class="fa-solid fa-map mb-1"></i><br>PLAN
        </button>
        <button onclick="switchTab('budget')" class="tab-item" id="t-budget">
            <i class="fa-solid fa-receipt mb-1"></i><br>BUDGET
        </button>
    </nav>

    <script>
        // 1. 分頁切換邏輯 (解決點擊無效)
        function switchTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        // 2. 彈窗切換
        function toggleModal(id, show) {
            const m = document.getElementById(id);
            if(show) m.classList.add('active');
            else m.classList.remove('active');
        }

        // 3. 顯示詳情
        function viewDetail(title, desc, menuStr) {
            document.getElementById('md-title').innerText = title;
            document.getElementById('md-desc').innerText = desc;
            const items = menuStr.split(',');
            let html = '';
            items.forEach(i => {
                const [zh, jp] = i.split('/');
                html += `<div class="flex justify-between py-2 border-b border-black/5 text-sm">
                            <span class="font-bold">${zh}</span>
                            <span class="serif text-xs text-gray-400">${jp||''}</span>
                         </div>`;
            });
            document.getElementById('md-menu').innerHTML = html;
            toggleModal('m-detail', true);
        }

        // 4. AI 生成功能
        function aiGen() {
            const name = document.getElementById('in-name').value;
            if(!name) return;
            
            const desc = `「${name}」是東京旅行中的靈魂亮點。在這裡，你可以感受到這座城市獨有的秩序美學。AI 為您推薦以下必試內容。`;
            const menu = `${name} 套餐 / 限定品, 職人推薦 / おすすめ, 季節限定飲品 / 旬`;
            
            const list = document.getElementById('itinerary-list');
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => viewDetail(name, desc, menu);
            card.innerHTML = `
                <img src="https://images.unsplash.com/photo-149
