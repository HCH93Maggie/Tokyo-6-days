<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京極簡旅遊助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --jp-red: #D63031; --jp-beige: #F8F4ED; }
        body { background-color: var(--jp-beige); color: #2C3E50; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .tag { font-size: 10px; padding: 2px 10px; border-radius: 99px; font-weight: bold; margin-right: 5px; }
        .nav-active { color: var(--jp-red); }
    </style>
</head>
<body class="pb-28">
    <div class="p-6 bg-white rounded-b-[40px] shadow-sm mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic">TOKYO 6D5N</h1>
            <p class="text-xs text-gray-400 font-mono mt-1">2026.03.16 START</p>
        </div>
        <div class="text-right">
            <p class="text-2xl">☀️</p>
            <p class="text-xs font-bold">東京 18°C</p>
        </div>
    </div>

    <div class="px-6" id="itinerary">
        <div class="mb-4 text-xs font-black text-gray-400 tracking-tighter uppercase">Day 1: 抵達與新宿</div>
        
        <div class="card border-l-4 border-blue-400">
            <div class="flex justify-between items-start mb-2">
                <span class="tag bg-blue-50 text-blue-600">🚃 交通</span>
                <span class="text-xs text-gray-400 font-mono">14:00</span>
            </div>
            <h3 class="text-lg font-bold">成田特快 N'EX</h3>
            <p class="text-sm text-gray-500 mt-1">成田機場直達新宿，請對號入座。</p>
            <a href="https://www.google.com/maps/search/Narita+Airport" class="mt-4 block text-center py-3 bg-gray-900 text-white rounded-xl text-xs font-bold shadow-md">📍 導航至機場車站</a>
        </div>

        <div class="card border-l-4 border-orange-400">
            <div class="flex justify-between items-start mb-2">
                <span class="tag bg-orange-50 text-orange-600">🍴 餐廳</span>
                <span class="text-xs text-gray-400 font-mono">19:00</span>
            </div>
            <h3 class="text-lg font-bold">敘敘苑燒肉 - 新宿歌舞伎町店</h3>
            <div class="mt-2 flex flex-wrap gap-y-2">
                <span class="tag bg-red-100 text-red-600">必吃美食</span>
                <span class="tag bg-yellow-100 text-yellow-700">必點：上等牛舌</span>
            </div>
            <p class="text-sm text-gray-500 mt-3 bg-gray-50 p-3 rounded-lg leading-relaxed">
                💡 **導遊攻略**：敘敘苑晚間價格較高，但新宿店的高樓景觀極美。如果還沒預約，可以請飯店櫃檯代撥電話確認。
            </p>
            <a href="https://www.google.com/maps/search/叙々苑+新宿" class="mt-4 block text-center py-3 bg-gray-900 text-white rounded-xl text-xs font-bold">📍 啟動導航</a>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl border-t border-gray-100 flex justify-around py-5 pb-8 z-50">
        <div class="flex flex-col items-center nav-active"><i class="fa-solid fa-calendar-day text-xl"></i><span class="text-[10px] mt-1 font-bold">行程</span></div>
        <div class="flex flex-col items-center text-gray-300"><i class="fa-solid fa-lightbulb text-xl"></i><span class="text-[10px] mt-1">推薦</span></div>
        <div class="flex flex-col items-center text-gray-300"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] mt-1">記帳</span></div>
        <div class="flex flex-col items-center text-gray-300" onclick="alert('緊急聯絡：110(警), 119(消)')"><i class="fa-solid fa-phone text-xl"></i><span class="text-[10px] mt-1">緊急</span></div>
    </nav>
</body>
</html>
